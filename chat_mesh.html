<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meshtastic Чат (Автономний)</title>
    <style>
        :root {
            --bg-color: #1e1e2e; --text-color: #cdd6f4; --panel-bg: #313244;
            --grid-border: #45475a; --water-color: #89b4fa;
        }
        body { font-family: sans-serif; background-color: var(--bg-color); color: var(--text-color); padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .main-container { display: flex; gap: 20px; width: 100%; max-width: 600px; }
        .chat-area { flex: 2; background: var(--panel-bg); padding: 15px; border-radius: 8px; }
        .sidebar { flex: 1; background: var(--panel-bg); padding: 15px; border-radius: 8px; }
        
        #messages { height: 300px; overflow-y: auto; border: 1px solid var(--grid-border); padding: 10px; margin-bottom: 10px; font-family: monospace; font-size: 0.9rem; }
        input, button { padding: 10px; margin: 5px 0; border-radius: 4px; border: none; width: 100%; box-sizing: border-box; }
        input { background: var(--bg-color); color: var(--text-color); }
        button { background: var(--water-color); color: var(--bg-color); font-weight: bold; cursor: pointer; }
        
        .node-item { cursor: pointer; color: var(--water-color); padding: 3px 0; border-bottom: 1px solid var(--grid-border); }
        .node-item:hover { text-decoration: underline; }
        h4 { margin-top: 0; }
.navbar {
    width: 100%;
    max-width: 600px;
    background: #313244;
    padding: 10px;
    border-radius: 8px;
    margin-bottom: 20px;
    display: flex;
    justify-content: space-around;
    border: 1px solid #45475a;
}
.navbar a {
    color: #89b4fa;
    text-decoration: none;
    font-weight: bold;
    padding: 5px 10px;
}
.navbar a:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="navbar">
    <a href="chess_mesh.html">♟ Шахи</a>
    <a href="checkers_mesh.html">⛀ Шашки</a>
    <a href="battleship_mesh.html">🚢 Морський бій</a>
    <a href="chat_mesh.html">💬 Чат</a>
</div>
    <h2>Meshtastic Чат</h2>

    <div class="main-container">
        <div class="chat-area">
            <div id="messages"></div>
            <input type="text" id="target" placeholder="Кому (залиш порожнім для Broadcast)">
            <input type="text" id="msgInput" placeholder="Повідомлення...">
            <button onclick="sendChat()">Надіслати</button>
        </div>

        <div class="sidebar">
            <h4>Онлайн:</h4>
            <div id="nodeList"></div>
            <button onclick="socket.send('GET_NODES')">Оновити список</button>
            <hr>
            <a href="chess_mesh.html" style="color:var(--text-color); font-size: 0.8rem; text-decoration: none;">⬅ До ігор</a>
        </div>
    </div>

    <script>
        // Підключаємось до нашого bridge.py
        const socket = new WebSocket("ws://" + window.location.host + "/ws");
        const msgDiv = document.getElementById('messages');

        // Обробка вхідних повідомлень
        socket.onmessage = (e) => {
            const data = e.data;
            
            // Якщо це повідомлення чату
            if (data.startsWith("CHAT:")) {
                const parts = data.split(':');
                const sender = parts[1];
                const msg = parts.slice(2).join(':');
                msgDiv.innerHTML += `<div><b>${sender}:</b> ${msg}</div>`;
                msgDiv.scrollTop = msgDiv.scrollHeight;
            } 
            // Якщо це оновлення списку нод
            else if (data.startsWith("NODES:")) {
                const list = data.split(':')[1].split(',');
                const listDiv = document.getElementById('nodeList');
                listDiv.innerHTML = list.map(n => 
                    `<div class="node-item" onclick="document.getElementById('target').value='${n}'">${n}</div>`
                ).join('');
            }
        };

        // Функція відправки
        function sendChat() {
            const text = document.getElementById('msgInput').value;
            const target = document.getElementById('target').value || "BROADCAST";
            
            if (text) {
                // Надсилаємо формат: Нік|CHAT:Текст
                socket.send(`${target}|CHAT:${text}`);
                msgDiv.innerHTML += `<div style="color:var(--water-color)"><b>Ви -> ${target}:</b> ${text}</div>`;
                msgDiv.scrollTop = msgDiv.scrollHeight;
                document.getElementById('msgInput').value = '';
            }
        }
    </script>
</body>
</html>
